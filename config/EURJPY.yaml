symbol: EURJPY

# Session boundaries (UTC hours, half-open [start, end)).
# EURJPY is a cross pair — driven by both EUR and JPY centres.
# Asian/Tokyo (JPY-primary) and London (EUR-primary) are the two active zones.
# London/NY overlap is moderate; NY is weaker for EUR crosses than for USD crosses.
# Overnight is the quietest window.
# Structurally closer to GBPJPY than to USDJPY.
sessions:
  overnight: [21,  0]  # 21–00 UTC — quietest window
  asian:     [0,   7]  # 00–07 UTC — Tokyo active, JPY primary
  london:    [7,  12]  # 07–12 UTC — EUR primary session, highly active
  london_ny: [12, 17]  # 12–17 UTC — EUR fades, moderate for EURJPY
  ny:        [17, 21]  # 17–21 UTC — typically weaker for EUR crosses

data:
  root: big-data/mlData/raw
  file_pattern: "{symbol}-sorted-{timeframe}.parquet"

timeframes:
  execution: 1min

mechanics:
  # precomputed in features.py — change these only if regenerating features
  ema_touch: 20           # EMA period used to compute ema20 column
  ema_traj: 3             # EMA period used to compute ema3 column
  rsi_period: 30          # RSI period used to compute rsi30 column
  context_stable_bars: 3  # consecutive bars for context ST stability flag
  # live config — read by engine/strategy at runtime
  of_depth_a2: 4          # pivot lookback depth for A2 OF gate
  of_min_a2: 2            # minimum pivots required for A2 OF gate
  pivot_maxlen: 8         # max pivots stored in pivot array

hypotheses:
  A1:
    enabled: true
    trigger_mode: ema20_touch   # touch EMA20 + clean_approach + bounce
    ema3_slope_mode: lax        # lax: ema3[n-2] > ema3[n]; strict: full monotone chain
    sl_mode: ema20_st_pocket    # pocket-width clamped to [a1_sl_min, a1_sl_max]
    a1_sl_min: 0.15             # 15 pip floor (EURJPY pip = 0.01)
    a1_sl_max: 0.25             # 25 pip cap
    rr: 1.5
    session_gate: true          # ON for deployment: cross-phase gated candidate
    # ph3: [asian, london, london_ny, overnight]  — drop ny (flat +0.001, −0.007 in combo)
    # ph4 / step4.5: [asian, london, ny]          — drop london_ny (−14R), overnight (−11R)
    allowed_sessions: [asian, london, ny]
    pullback_gate: true         # ON — core hypothesis constraint
    flicker_suppression: own_hypothesis
    rsi_gate_enabled: false
    rsi_bull_gate: 55.0
    rsi_bear_gate: 48.0
  A2:
    enabled: true
    session_gate: true          # ON for deployment: cross-phase gated candidate
    allowed_sessions: [london, london_ny, ny]  # consistent across ph4/ph5/ph7; asian dead everywhere
    pullback_gate: true         # ON — core hypothesis constraint
    flicker_suppression: own_hypothesis
    of_direction_mode: lax      # lax = trust context TF direction
    pd_level: 0.51              # pullback depth to enter: 51%
    sl_min: 0.15                # 15 pip floor (EURJPY pip = 0.01)
    sl_max: 0.25                # 25 pip cap
    sl_epsilon: 0.03            # 3 pip buffer beyond last pivot extreme
    rr: 1.5
  B:
    enabled: true
    session_gate: true          # ON for deployment: cross-phase gated candidate
    # ph3: [london, london_ny]  — asian (−13R), ny (−6R) dead
    # ph4: [ny]                 — london (−16R) dominant drag
    # step4.5 ph5: [london, london_ny, ny]
    allowed_sessions: [london, london_ny, ny]
    pullback_gate: false
    flicker_suppression: own_hypothesis
    sl_fixed: 0.25              # 25 pip fixed SL (EURJPY pip = 0.01)
    rr: 2.0

execution:
  policy: policy3
  require_context_stable: true
  cooldown_enabled: false
  cooldown_bars: 6
  max_concurrent_positions_per_symbol: 1
  same_bar_priority: [B, A2, A1]
  policy3:
    allow_any_direction_stack: true
    allow_same_bar_overlap: false
  policy2:
    trigger_first: true

combos:
  A1 only: [A1]
  A2 only: [A2]
  B only: [B]
  A1+B: [A1, B]
  A2+B: [A2, B]
  A1+A2+B: [A1, A2, B]

cross_phase:
  enabled: true   # Step 4.5 active — A1+A2@phase4, B@phase5
  branches:
    A1:
      enabled: true
      phase: phase4   # strongest gated A1: ev=+0.057, gate=[asian,london,ny]
    A2:
      enabled: true
      phase: phase4   # strongest gated A2 on same arch: ev=+0.447, gate=[london,london_ny,ny]
    B:
      enabled: true
      phase: phase5   # best B home: ev=+0.095 ungated, gate=[london,london_ny,ny]
  same_bar_priority: [B, A2, A1]
  max_concurrent_positions_per_symbol: 1

architecture_phases:
  phase1:
    label: 5m ST(12,3) entry vs 1H ST(12,3) context
    entry_timeframe: 5m
    context_timeframe: 1h
    entry_st: {period: 12, multiplier: 3.0}
    context_st: {period: 12, multiplier: 3.0}
  phase2:
    label: 5m ST(12,3) entry vs 1H ST(11,2) context
    entry_timeframe: 5m
    context_timeframe: 1h
    entry_st: {period: 12, multiplier: 3.0}
    context_st: {period: 11, multiplier: 2.0}
  phase3:
    label: 15m ST(12,3) entry vs 1H ST(12,3) context
    entry_timeframe: 15m
    context_timeframe: 1h
    entry_st: {period: 12, multiplier: 3.0}
    context_st: {period: 12, multiplier: 3.0}
  phase4:
    label: 15m ST(11,2) entry vs 1H ST(12,3) context
    entry_timeframe: 15m
    context_timeframe: 1h
    entry_st: {period: 11, multiplier: 2.0}
    context_st: {period: 12, multiplier: 3.0}
  phase5:
    label: 15m ST(11,2) entry vs 1H ST(11,2) context
    entry_timeframe: 15m
    context_timeframe: 1h
    entry_st: {period: 11, multiplier: 2.0}
    context_st: {period: 11, multiplier: 2.0}
  phase6:
    label: 15m ST(12,3) entry vs 4H ST(12,3) context
    entry_timeframe: 15m
    context_timeframe: 4h
    entry_st: {period: 12, multiplier: 3.0}
    context_st: {period: 12, multiplier: 3.0}
  phase7:
    label: 15m ST(11,2) entry vs 4H ST(12,3) context
    entry_timeframe: 15m
    context_timeframe: 4h
    entry_st: {period: 11, multiplier: 2.0}
    context_st: {period: 12, multiplier: 3.0}
  phase8:
    label: 15m ST(11,2) entry vs 4H ST(11,2) context
    entry_timeframe: 15m
    context_timeframe: 4h
    entry_st: {period: 11, multiplier: 2.0}
    context_st: {period: 11, multiplier: 2.0}

deployment:
  # Cross-phase gated: ev=+0.060R, total=+118.5R, pf=1.101, dd=32.0R  ← recommended
  # Single-phase ph4:  ev=+0.050R, total=+90.5R,  pf=1.085, dd=35.5R  ← fallback
  selected_phase: phase4     # A1+A2 anchor phase
  selected_combo: A1+A2+B    # cross-phase: B on phase5

regime_gate: {}
